name: Apply print H1 fixes

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/apply-h1-print-fixes.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact replacements and validate
        run: |
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser

          replacements = {
            'calculadora-atuador-pneumatico.html': [
              ('.print-sheet h1{font-size:20pt;margin:0 0 5mm;color:#000!important}', '.print-sheet .print-title{font-size:20pt;font-weight:700;margin:0 0 5mm;color:#000!important}'),
              ('<h1>Memória de cálculo — Atuador pneumático</h1>', '<div class="print-title">Memória de cálculo — Atuador pneumático</div>'),
            ],
            'calculadora-erro-calibracao.html': [
              ('.print-sheet h1{font-size:20pt;margin:0 0 4mm;color:#000!important}', '.print-sheet .print-title{font-size:20pt;font-weight:700;margin:0 0 4mm;color:#000!important}'),
              ('<section class="print-sheet" id="printSheet" aria-hidden="true"><h1>Relatório de cálculo — Erro de calibração</h1><p class="muted-print" id="printDate"></p><div id="printContent"></div></section>', '<section class="print-sheet" id="printSheet" aria-hidden="true"><div class="print-title">Relatório de cálculo — Erro de calibração</div><p class="muted-print" id="printDate"></p><div id="printContent"></div></section>'),
            ],
            'calculadora-erro-total-malha-instrumentacao.html': [
              ('.print-sheet h1{font-size:20pt;margin:0 0 4mm;color:#000!important}', '.print-sheet .print-title{font-size:20pt;font-weight:700;margin:0 0 4mm;color:#000!important}'),
              ('<h1>Memória de cálculo — Erro total de malha</h1>', '<div class="print-title">Memória de cálculo — Erro total de malha</div>'),
            ],
            'calculadora-lrv-urv-span.html': [
              ('#printSheet h1{font-size:20pt;margin:0 0 4px}', '#printSheet .print-title{font-size:20pt;font-weight:700;margin:0 0 4px}'),
              ('<section id="printSheet" class="print-only" aria-label="Documento técnico para impressão">\n      <h1>Calculadora de LRV, URV e Span</h1>', '<section id="printSheet" class="print-only" aria-label="Documento técnico para impressão">\n      <div class="print-title">Calculadora de LRV, URV e Span</div>'),
            ],
            'calculadora-pt100.html': [
              ('.print-sheet h1{font-size:20pt;margin:0 0 4mm;color:#000!important}', '.print-sheet .print-title{font-size:20pt;font-weight:700;margin:0 0 4mm;color:#000!important}'),
              ('<h1>Memória de cálculo — Sensor RTD de platina</h1>', '<div class="print-title">Memória de cálculo — Sensor RTD de platina</div>'),
            ],
            'calculadora-resistor-shunt-sinal-instrumentacao.html': [
              ('.print-sheet h1{font-size:20pt;margin:0 0 4mm;color:#000!important}', '.print-sheet .print-title{font-size:20pt;font-weight:700;margin:0 0 4mm;color:#000!important}'),
              ('<h1>Relatório de cálculo — Resistor shunt de instrumentação</h1>', '<div class="print-title">Relatório de cálculo — Resistor shunt de instrumentação</div>'),
            ],
            'calculadora-temperatura-industrial.html': [
              ('.print-sheet h1{font-size:22px;margin:0 0 5px}', '.print-sheet .print-title{font-size:22px;font-weight:700;margin:0 0 5px}'),
              ('</main><section aria-hidden="true" class="print-sheet" id="printSheet"><h1>Relatório de temperatura industrial</h1><p id="printDate"></p><div id="printContent"></div></section>', '</main><section aria-hidden="true" class="print-sheet" id="printSheet"><div class="print-title">Relatório de temperatura industrial</div><p id="printDate"></p><div id="printContent"></div></section>'),
            ],
            'calculadora-termopar.html': [
              ('.print-neutral-header h1{font-size:20pt;margin:0 0 4px;color:#111}', '.print-neutral-header .print-title{font-size:20pt;font-weight:700;margin:0 0 4px;color:#111}'),
              ('<section class="print-only print-neutral-header"><h1>Relatório de conversão de termopar</h1><p>Documento técnico orientativo — sem identificação comercial.</p></section>', '<section class="print-only print-neutral-header"><div class="print-title">Relatório de conversão de termopar</div><p>Documento técnico orientativo — sem identificação comercial.</p></section>'),
            ],
          }

          for filename, pairs in replacements.items():
            path = Path(filename)
            text = path.read_text(encoding='utf-8')
            for old, new in pairs:
              if text.count(old) != 1:
                raise SystemExit(f'{filename}: esperado exatamente 1 trecho antigo: {old!r}')
              text = text.replace(old, new)
              if text.count(new) != 1:
                raise SystemExit(f'{filename}: substituição não ficou única: {new!r}')
            path.write_text(text, encoding='utf-8')

          class H1Counter(HTMLParser):
            def __init__(self):
              super().__init__(convert_charrefs=True)
              self.h1 = 0
            def handle_starttag(self, tag, attrs):
              if tag.lower() == 'h1':
                self.h1 += 1

          problems = []
          for filename in replacements:
            parser = H1Counter()
            parser.feed(Path(filename).read_text(encoding='utf-8'))
            if parser.h1 != 1:
              problems.append(f'{filename}: {parser.h1} H1 estático(s)')
          if problems:
            raise SystemExit('\n'.join(problems))
          PY

      - name: Commit fixes and remove temporary workflow
        run: |
          rm .github/workflows/apply-h1-print-fixes.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add calculadora-atuador-pneumatico.html \
            calculadora-erro-calibracao.html \
            calculadora-erro-total-malha-instrumentacao.html \
            calculadora-lrv-urv-span.html \
            calculadora-pt100.html \
            calculadora-resistor-shunt-sinal-instrumentacao.html \
            calculadora-temperatura-industrial.html \
            calculadora-termopar.html \
            .github/workflows/apply-h1-print-fixes.yml
          git commit -m 'Corrige H1 duplicados em relatórios de impressão'
          git push origin HEAD:${{ github.head_ref }}
