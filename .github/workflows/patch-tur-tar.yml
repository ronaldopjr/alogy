name: Patch TUR TAR decimals

on:
  push:
    branches:
      - agent/corrige-decimais-tur-tar

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corrige-decimais-tur-tar
          fetch-depth: 0
      - name: Apply exact patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('calculadora-incerteza-calibracao-tur-tar.html')
          text = path.read_text(encoding='utf-8')

          decimal_ids = [
              'lrv', 'urv', 'tolAbs', 'tolSpan', 'tolLeitura', 'tolMin',
              'uPadrao', 'kPadrao', 'accPadrao', 'resPadrao', 'resUut',
              'repStd', 'uAmb', 'kExp'
          ]
          for field_id in decimal_ids:
              pattern = rf'(<input id="{field_id}") type="number" step="any"'
              text, count = re.subn(pattern, rf'\1 type="text" inputmode="decimal" autocomplete="off"', text)
              if count != 1:
                  raise SystemExit(f'Expected one replacement for {field_id}, got {count}')

          old_row = '''  tr.innerHTML=`<td><input class="ptPct" type="number" step="any" value="${pct}"></td><td class="refCell">--</td><td><input class="ptMed" type="number" step="any" value="${med===null?'':med}"></td><td><input class="ptObs" value="${esc(obs)}"></td><td class="ptStatus">--</td>`;'''
          new_row = '''  tr.innerHTML=`<td><input class="ptPct" type="text" inputmode="decimal" autocomplete="off" aria-label="Ponto ${idx} em porcentagem" value="${pct}"></td><td class="refCell">--</td><td><input class="ptMed" type="text" inputmode="decimal" autocomplete="off" aria-label="Valor medido do ponto ${idx}" value="${med===null?'':med}"></td><td><input class="ptObs" aria-label="Observação do ponto ${idx}" value="${esc(obs)}"></td><td class="ptStatus">--</td>`;'''
          if text.count(old_row) != 1:
              raise SystemExit('Dynamic row template not found exactly once')
          text = text.replace(old_row, new_row)

          old_parse = "    const pct=numFrom(tr.querySelector('.ptPct').value); const med=parseFloat(tr.querySelector('.ptMed').value); const obs=tr.querySelector('.ptObs').value||'';"
          new_parse = "    const pct=numFrom(tr.querySelector('.ptPct').value); const med=numFrom(tr.querySelector('.ptMed').value); const obs=tr.querySelector('.ptObs').value||'';"
          if text.count(old_parse) != 1:
              raise SystemExit('Old measured-value parser not found exactly once')
          text = text.replace(old_parse, new_parse)

          if text.count('inputmode="decimal"') != 16:
              raise SystemExit('Unexpected decimal input count')
          if 'parseFloat' in text:
              raise SystemExit('parseFloat still present')
          if text.count('<h1') != 1:
              raise SystemExit('Unexpected H1 count')
          if len(text.splitlines()) != 371:
              raise SystemExit('Unexpected line count')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate inline JavaScript
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('calculadora-incerteza-calibracao-tur-tar.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S)
          inline = '\n'.join(s for s in scripts if s.strip() and not s.lstrip().startswith('{'))
          Path('/tmp/tur-tar-inline.js').write_text(inline, encoding='utf-8')
          PY
          node --check /tmp/tur-tar-inline.js
      - name: Commit patch and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/patch-tur-tar.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add calculadora-incerteza-calibracao-tur-tar.html .github/workflows/patch-tur-tar.yml
          git commit -m "Corrige entrada decimal na calculadora TUR TAR"
          git push origin HEAD:agent/corrige-decimais-tur-tar
